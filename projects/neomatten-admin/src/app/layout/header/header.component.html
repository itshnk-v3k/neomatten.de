<header
  class="flex h-16 items-center justify-between border-b border-neutral-200 bg-white px-4 lg:px-6">
  <div class="flex items-center gap-3">
    <!-- Mobile drawer toggle -->
    <button
      type="button"
      (click)="toggleSidebar.emit()"
      class="rounded-lg p-2 text-neutral-600 transition hover:bg-neutral-100 lg:hidden"
      [attr.aria-label]="'header.openMenu' | t">
      <svg lucideMenu class="size-5"></svg>
    </button>
    <h1 class="text-lg font-semibold text-neutral-900">{{ title() }}</h1>
  </div>

  <div class="flex items-center gap-3 sm:gap-4">
    <na-language-switcher />
    @if (email(); as email) {
      <span class="hidden text-sm text-neutral-500 sm:inline">{{ email }}</span>
    }
    <button
      type="button"
      (click)="logout()"
      class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-medium text-neutral-700 transition hover:bg-neutral-100"
      [attr.aria-label]="'header.logout' | t">
      <svg lucideLogOut class="size-4"></svg>
      <span class="hidden sm:inline">{{ 'header.logout' | t }}</span>
    </button>
  </div>
</header>
