<!--
  Branded combobox: a button trigger + a listbox panel of options (no native
  <select>). Trigger carries combobox ARIA; the panel is role=listbox with
  role=option children. Keyboard handling lives in the component. Labels/
  placeholder are already-localized strings passed in by the caller.
-->
<div class="relative">
  <button
    #trigger
    type="button"
    [id]="inputId()"
    role="combobox"
    aria-haspopup="listbox"
    [attr.aria-expanded]="open()"
    [attr.aria-controls]="listboxId()"
    [attr.aria-label]="ariaLabel() || null"
    [attr.aria-activedescendant]="open() && activeIndex() >= 0 ? optionId(activeIndex()) : null"
    [disabled]="disabled()"
    [class]="
      'flex w-full items-center justify-between gap-2 rounded-lg border bg-white px-3 py-2.5 text-left text-sm text-neutral-900 outline-none focus:ring-2 focus:ring-primary/20 disabled:cursor-not-allowed disabled:opacity-60 ' +
      (open() ? 'border-primary' : 'border-neutral-300')
    "
    (click)="toggle()"
    (keydown)="onKeydown($event)">
    @if (selectedOption(); as selected) {
      <span class="truncate">{{ selected.label }}</span>
    } @else {
      <span class="truncate text-neutral-400">{{ placeholder() }}</span>
    }
    <svg
      lucideChevronDown
      aria-hidden="true"
      class="size-4 shrink-0 text-neutral-400"
      [class.rotate-180]="open()"></svg>
  </button>

  @if (open()) {
    <div
      role="listbox"
      [id]="listboxId()"
      [attr.aria-label]="ariaLabel() || null"
      class="absolute z-30 mt-1 max-h-60 w-full overflow-auto rounded-lg border border-neutral-200 bg-white py-1 shadow-lg">
      @for (option of options(); track option.value; let i = $index) {
        <!-- keyboard handled on the combobox trigger via aria-activedescendant; options are intentionally not focusable (listbox pattern) -->
        <!-- eslint-disable-next-line @angular-eslint/template/click-events-have-key-events, @angular-eslint/template/interactive-supports-focus -->
        <div
          role="option"
          [id]="optionId(i)"
          [attr.aria-selected]="value() === option.value"
          [attr.aria-disabled]="option.disabled ? true : null"
          class="cursor-pointer px-3 py-2 text-sm"
          [class]="
            (i === activeIndex() ? 'bg-neutral-100 ' : '') +
            (value() === option.value ? 'font-semibold text-primary ' : 'text-neutral-800 ') +
            (option.disabled ? 'cursor-not-allowed opacity-50' : '')
          "
          (click)="selectOption(option)"
          (mouseenter)="activeIndex.set(i)">
          {{ option.label }}
        </div>
      } @empty {
        <div class="px-3 py-2 text-sm text-neutral-400">{{ placeholder() }}</div>
      }
    </div>
  }
</div>
