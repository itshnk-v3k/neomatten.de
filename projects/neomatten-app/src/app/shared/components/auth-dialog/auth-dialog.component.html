<!--
  EN: Auth dialog content — the shared nm-auth-form, with its bottom switch link
      and "forgot password" link swapping login / register / forgot in place.
      Success closes the dialog and emits `authenticated`; an in-form navigation
      link (privacy policy, lockout hint) also closes it.
  RU: Содержимое диалога — общая nm-auth-form; нижняя ссылка и ссылка «забыли
      пароль» переключают вход / регистрацию / восстановление на месте. Успех
      закрывает диалог и эмитит `authenticated`; ссылка-переход внутри формы
      (политика, подсказка блокировки) тоже закрывает.
-->
<nm-dialog [(open)]="open" titleKey="auth_dialog_title">
  <nm-auth-form
    [(mode)]="mode"
    linkMode="toggle"
    (succeeded)="onSucceeded()"
    (dismiss)="open.set(false)" />
</nm-dialog>
