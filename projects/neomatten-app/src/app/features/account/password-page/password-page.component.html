<!--
  EN: Change-password form (current / new / confirm with match) inside the
      account shell content column. Save changes the password via mock AuthService.
  RU: Форма смены пароля (текущий / новый / подтверждение с совпадением) в колонке
      контента оболочки аккаунта. Сохранение меняет пароль через мок AuthService.
-->
<div class="mx-auto w-full max-w-full rounded-lg bg-surface px-6 py-8 shadow-soft lg:max-w-[80%]">
  <h1 class="text-2xl font-bold">{{ 'account_password_title' | translate }}</h1>
  @if (auth.loading()) {
    <div class="mt-6 flex flex-col gap-4">
      @for (i of [0, 1, 2]; track i) {
        <div class="flex flex-col gap-1.5">
          <nm-skeleton variant="text" width="30%" />
          <nm-skeleton class="h-11 w-full rounded-md" />
        </div>
      }
    </div>
  } @else {
    <form [formGroup]="form" (ngSubmit)="submit()" class="mt-6 flex flex-col gap-4">
      <nm-input
        formControlName="currentPassword"
        type="password"
        label="account_current_password"
        autocomplete="current-password"
        [required]="true" />
      <nm-input
        formControlName="newPassword"
        type="password"
        label="account_new_password"
        hint="auth_password_hint"
        autocomplete="new-password"
        [required]="true" />
      <div>
        <nm-input
          formControlName="confirmPassword"
          type="password"
          label="auth_confirm_password"
          autocomplete="new-password"
          [required]="true" />
        @if (showMismatch) {
          <p class="mt-1.5 text-xs text-error">{{ 'validation_mismatch' | translate }}</p>
        }
      </div>
      <button
        nmButton
        type="submit"
        class="mt-2 w-full rounded-full bg-gradient-red hover:scale-[1.02] hover:shadow-glow-red"
        [loading]="submitting()">
        {{ 'action_save' | translate }}
      </button>
    </form>
  }
</div>
