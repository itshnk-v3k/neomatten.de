<!--
  EN: Login page — breadcrumb + the shared auth card (nm-auth-form) in login mode.
      The card owns the form, lockout, social login and the "no account?" link.
  RU: Страница входа — крошки + общая карточка (nm-auth-form) в режиме входа.
      Карточка содержит форму, блокировку, вход через соцсети и ссылку «нет аккаунта?».
-->
<section class="mx-auto max-w-container px-6 py-12 lg:py-16">
  <nm-breadcrumb />
  <div class="mx-auto max-w-md">
    <nm-auth-form mode="login" (succeeded)="onSucceeded()" />
  </div>
</section>
