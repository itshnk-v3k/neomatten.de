<main class="flex min-h-[60vh] items-center justify-center px-4 py-16">
  @if (failed()) {
    <div class="w-full max-w-sm text-center">
      <h1 class="text-lg font-semibold text-content">
        {{ 'auth_callback_error_title' | translate }}
      </h1>
      <p class="mt-2 text-sm text-content-muted">{{ 'auth_callback_error' | translate }}</p>
      <a
        routerLink="/account/login"
        class="mt-6 inline-block rounded-md bg-primary px-5 py-2.5 text-sm font-semibold text-white hover:bg-primary-bright">
        {{ 'auth_callback_retry' | translate }}
      </a>
    </div>
  } @else {
    <div class="flex flex-col items-center gap-3 text-center" role="status" aria-live="polite">
      <span
        class="size-8 animate-spin rounded-full border-2 border-border border-t-primary"
        aria-hidden="true"></span>
      <p class="text-sm text-content-muted">{{ 'auth_callback_loading' | translate }}</p>
    </div>
  }
</main>
