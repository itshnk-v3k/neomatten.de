<!--
  EN: CSS-rendered mat preview — material colour fill + texture pattern overlay +
      edge-colour border, a caption, and overlay badges for 3D mount / heel pad.
  RU: CSS-превью коврика — заливка цветом материала + узор фактуры + рамка цвета
      канта, подпись и бейджи-оверлеи для 3D-крепления / подпятника.
-->
<figure class="relative">
  <!-- While the preview render resolves (or none is uploaded yet): image skeleton
       with an "EVA · —" caption; once loaded, the real render or the CSS fallback shows. -->
  @if (loading() && !previewUrl()) {
    <nm-skeleton variant="image" class="h-72 w-full" />
    <figcaption class="mt-3 text-center text-sm font-semibold text-content-secondary">
      EVA · —
    </figcaption>
  } @else {
    <!-- TODO(admin): when a real preview render exists (MediaService.getMatPreviewUrl),
         show it; otherwise fall back to the CSS-rendered preview below. -->
    @if (previewUrl(); as url) {
      <div class="relative aspect-[4/3] w-full overflow-hidden rounded-2xl shadow-soft">
        @if (!imageFailed()) {
          <img
            [ngSrc]="url"
            fill
            [alt]="caption()"
            sizes="(max-width: 1024px) 90vw, 30vw"
            (error)="onImageError()"
            class="object-cover" />
        } @else {
          <nm-image-placeholder class="size-full rounded-none" />
        }
      </div>
    } @else {
      <!-- Photo simulation: texture photo + mat-colour tint + edge-colour trim.
           All layers use object-contain / mask contain + center so they align;
           both colour overlays are masked to their shape so the transparent
           background is never tinted. The mat photos are dark, so light colours
           read subtly under `multiply`. -->
      <div class="relative aspect-square w-full overflow-hidden rounded-2xl shadow-soft">
        <!-- Base mat texture photo (contain → whole mat visible, never cropped). -->
        <img
          [ngSrc]="textureImageSrc()"
          fill
          [alt]="caption()"
          sizes="(max-width: 1024px) 90vw, 30vw"
          class="object-contain" />

        <!-- Mat colour overlay: plus-lighter tints the mat while preserving the
             texture, masked by the mat photo's alpha so only the mat body (and its
             blend mode) is set via matMaskStyle. -->
        <div
          class="pointer-events-none absolute opacity-70 inset-0"
          [style]="matMaskStyle()"
          [style.background-color]="materialHex()"></div>

        <!-- Edging outline (defines the trim shape + seam relief). -->
        <img
          src="assets/images/mats/edging.webp"
          alt=""
          aria-hidden="true"
          class="pointer-events-none absolute size-full object-contain inset-0" />

        <!-- Edge colour: a coloured layer masked to the edging outline so only the
             trim is tinted (a full-rect overlay would tint the whole mat). -->
        <div
          class="mat-edge-mask pointer-events-none absolute opacity-[0.85] inset-0"
          [style.background-color]="edgeHex()"></div>

        <!-- Clips overlay — rendered as-is (no blend, no tint). -->
        <img
          src="assets/images/mats/mat-clips.webp"
          alt=""
          aria-hidden="true"
          class="pointer-events-none absolute size-full object-contain inset-0" />

        <!-- Heel-rest overlay — topmost layer, same size/position as the clips
             (2077×2077, transparency baked in), rendered as-is (no blend/tint). -->
        @if (heelRestOverlaySrc(); as heelRestSrc) {
          <img
            [src]="heelRestSrc"
            alt=""
            aria-hidden="true"
            class="pointer-events-none absolute size-full object-contain inset-0" />
        }
      </div>
    }

    <div class="pointer-events-none absolute inset-0">
      <!-- badges -->
      <div class="absolute flex flex-col items-end gap-2 right-3 top-3">
        @if (mounting() === '3d') {
          <span class="rounded-full bg-ink/85 px-3 py-1 text-xs font-semibold text-white shadow">
            {{ 'configurator_mount_3d_badge' | translate }}
          </span>
        }
        @if (heelPad() !== 'none') {
          <span class="rounded-full bg-primary px-3 py-1 text-xs font-semibold text-white shadow">
            {{ heelPadLabelKey() | translate }}
          </span>
        }
      </div>
    </div>

    <figcaption class="mt-3 text-center text-sm font-semibold text-content">
      {{ caption() }}
    </figcaption>
  }
</figure>
