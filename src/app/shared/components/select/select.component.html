<!--
  EN: Custom select — a combobox button trigger and a listbox panel of options
      (no native <select>). Trigger carries combobox ARIA (aria-expanded /
      -controls / -activedescendant); the panel is role=listbox with role=option
      children. Keyboard handling lives in the component. Error/hint line below.
  RU: Кастомный select — кнопка-триггер combobox и панель listbox с опциями (без
      нативного <select>). Триггер несёт ARIA combobox (aria-expanded / -controls
      / -activedescendant); панель — role=listbox с детьми role=option. Клавиатура
      — в компоненте. Ниже строка ошибки/подсказки.
-->
@if (label()) {
  <label
    [id]="inputId() + '-label'"
    [for]="inputId()"
    class="mb-1.5 block text-sm font-medium text-content">
    {{ label() | translate }}
    @if (required()) {
      <span class="ml-0.5 text-error" aria-hidden="true">*</span>
    }
  </label>
}

<div class="relative">
  <button
    #trigger
    type="button"
    [id]="inputId()"
    role="combobox"
    aria-haspopup="listbox"
    [attr.aria-expanded]="open()"
    [attr.aria-controls]="listboxId()"
    [attr.aria-labelledby]="label() ? inputId() + '-label' : null"
    [attr.aria-label]="label() ? null : (placeholder() | translate)"
    [attr.aria-activedescendant]="open() && activeIndex() >= 0 ? optionId(activeIndex()) : null"
    [attr.aria-invalid]="errorMessage ? true : null"
    [attr.aria-describedby]="
      errorMessage ? inputId() + '-error' : hint() ? inputId() + '-hint' : null
    "
    [disabled]="disabled()"
    [class]="
      'flex h-11 w-full items-center justify-between gap-2 rounded-md border bg-surface-input px-4 text-left text-sm outline-none transition-colors focus-visible:border-primary disabled:cursor-not-allowed disabled:opacity-60 ' +
      (errorMessage ? 'border-error ' : 'border-border ') +
      (open() ? 'border-primary' : '')
    "
    (click)="toggle()"
    (keydown)="onKeydown($event)">
    @if (selectedOption(); as selected) {
      <span class="truncate text-content">{{ selected.label | translate }}</span>
    } @else {
      <span class="truncate text-content-muted">{{ placeholder() | translate }}</span>
    }
    <svg
      lucideChevronDown
      aria-hidden="true"
      class="size-4 shrink-0 text-content-muted transition-transform"
      [class.rotate-180]="open()"></svg>
  </button>

  @if (open()) {
    <div
      role="listbox"
      [id]="listboxId()"
      [attr.aria-labelledby]="label() ? inputId() + '-label' : null"
      [attr.aria-label]="label() ? null : (placeholder() | translate)"
      class="absolute z-20 mt-1 max-h-60 w-full overflow-auto rounded-md border border-border bg-surface py-1 shadow-lg">
      @for (option of options(); track option.value; let i = $index) {
        <!-- keyboard handled on the combobox trigger via aria-activedescendant; options are intentionally not focusable (listbox pattern) -->
        <!-- eslint-disable-next-line @angular-eslint/template/click-events-have-key-events, @angular-eslint/template/interactive-supports-focus -->
        <div
          role="option"
          [id]="optionId(i)"
          [attr.aria-selected]="value() === option.value"
          [attr.aria-disabled]="option.disabled ? true : null"
          class="cursor-pointer px-4 py-2 text-sm transition-colors"
          [class]="
            (i === activeIndex() ? 'bg-surface-subtle ' : '') +
            (value() === option.value ? 'font-semibold text-primary ' : 'text-content ') +
            (option.disabled ? 'cursor-not-allowed opacity-50' : '')
          "
          (click)="selectOption(option)"
          (mouseenter)="activeIndex.set(i)">
          {{ option.label | translate }}
        </div>
      } @empty {
        <div class="px-4 py-2 text-sm text-content-muted">{{ placeholder() | translate }}</div>
      }
    </div>
  }
</div>

@if (errorMessage) {
  <p [id]="inputId() + '-error'" class="mt-1.5 text-xs text-error">{{ errorMessage }}</p>
} @else if (hint()) {
  <p [id]="inputId() + '-hint'" class="mt-1.5 text-xs text-content-muted">
    {{ hint() | translate }}
  </p>
}
