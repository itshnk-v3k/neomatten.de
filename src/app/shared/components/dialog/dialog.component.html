<!--
  EN: Centered panel over a dimmed backdrop, rendered only while open(). When
      dismissible, a full-screen focusable backdrop button (behind the panel)
      closes on click; Escape and the X button also close.
  RU: Центрированная панель поверх затемнённого фона, только при open(). Если
      dismissible, полноэкранная фокусируемая кнопка-фон (за панелью) закрывает по
      клику; Escape и кнопка X также закрывают.
-->
@if (open()) {
  <div
    class="fixed inset-0 z-popup flex items-stretch justify-center bg-ink/60 animate-in fade-in md:items-center md:p-4">
    @if (dismissible()) {
      <button type="button" class="absolute inset-0 size-full cursor-default" (click)="close()">
        <span class="sr-only">{{ 'action_close' | translate }}</span>
      </button>
    }
    <!--
      Full-screen on mobile (rounded-none, fills the viewport); a centred card
      capped at 90vh on md+. Header + footer stay fixed while the body scrolls.
    -->
    <div
      role="dialog"
      aria-modal="true"
      [attr.aria-labelledby]="titleKey() ? titleId : null"
      [ngClass]="panelMaxWidth()"
      class="relative flex size-full flex-col bg-surface shadow-elev animate-in fade-in md:h-auto md:max-h-[90vh] md:rounded-lg md:zoom-in-95">
      @if (titleKey() || dismissible()) {
        <!-- Sticky header: title + close button. -->
        <div class="flex shrink-0 items-center gap-4 border-b border-border px-6 py-4">
          @if (titleKey()) {
            <h2 [id]="titleId" class="text-lg font-semibold text-content">
              {{ titleKey() | translate }}
            </h2>
          }
          @if (dismissible()) {
            <button
              type="button"
              class="-mr-2 ml-auto inline-flex size-8 shrink-0 items-center justify-center rounded-md text-content-muted transition-colors hover:bg-surface-subtle hover:text-content"
              (click)="close()">
              <svg lucideX class="size-5"></svg>
              <span class="sr-only">{{ 'action_close' | translate }}</span>
            </button>
          }
        </div>
      }

      <!-- Scrollable body. -->
      <div class="flex-1 overflow-y-auto px-6 py-5 text-sm text-content">
        <ng-content />
      </div>

      <!-- Sticky footer (hidden when no action content is projected). -->
      <div
        class="flex shrink-0 justify-end gap-3 border-t border-border px-6 py-4 empty:hidden empty:border-t-0">
        <ng-content select="[dialogFooter]" />
      </div>
    </div>
  </div>
}
