<!--
  EN: Payment-method options as a radio group — each row has a radio circle,
      brand logo(s) and a label; exactly one is active at a time. The sticky
      footer "Confirm payment" button (disabled until a method is selected)
      emits the choice. The amount is shown above for confirmation.
  RU: Способы оплаты как радиогруппа — в каждой строке радиокружок, логотип(ы)
      бренда и подпись; одновременно активен только один. Закреплённая кнопка
      «Jetzt bezahlen» (неактивна, пока способ не выбран) эмитит выбор. Сумма
      показана сверху для подтверждения.
-->
<nm-dialog [(open)]="open" titleKey="payment_dialog_title">
  <p class="mb-4 text-sm text-content-secondary">
    {{ 'payment_dialog_amount' | translate }}:
    <span class="font-bold text-content">{{ amount() }} &euro;</span>
  </p>

  <div
    role="group"
    [attr.aria-label]="'payment_dialog_title' | translate"
    class="flex flex-col gap-3">
    @for (option of options; track option.method) {
      <button
        type="button"
        [attr.aria-pressed]="method() === option.method"
        (click)="select(option.method)"
        [class]="
          'flex items-center gap-4 rounded-lg border p-4 text-left transition-colors ' +
          (method() === option.method
            ? 'border-primary bg-primary/5 ring-1 ring-primary'
            : 'border-border bg-surface hover:bg-surface-subtle')
        ">
        <span
          [class]="
            'grid size-5 shrink-0 place-items-center rounded-full border-2 ' +
            (method() === option.method ? 'border-primary' : 'border-chrome-mid')
          ">
          @if (method() === option.method) {
            <span class="size-2.5 rounded-full bg-primary"></span>
          }
        </span>
        <span class="flex items-center gap-2">
          @if (option.method === 'stripe_card') {
            <nm-brand-icon [icon]="visa" [colored]="true" class="size-7" />
            <nm-brand-icon [icon]="mastercard" [colored]="true" class="size-7" />
          } @else if (option.method === 'klarna') {
            <nm-brand-icon [icon]="klarna" [colored]="true" class="size-7" />
          } @else {
            <nm-brand-icon [icon]="paypal" [colored]="true" class="size-7" />
          }
        </span>
        <span class="font-medium">{{ option.labelKey | translate }}</span>
      </button>
    }
  </div>

  <div dialogFooter>
    <button
      nmButton
      type="button"
      class="w-full rounded-full"
      [disabled]="!method()"
      [loading]="processing()"
      (click)="confirm()">
      {{ 'payment_confirm' | translate }}
    </button>
  </div>
</nm-dialog>
