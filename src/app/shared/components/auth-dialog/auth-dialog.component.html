<!--
  EN: Auth dialog content — the shared nm-auth-form, with its bottom switch link
      toggling login / register in place. Success closes the dialog and emits
      `authenticated`; an in-form navigation link (privacy policy, lockout hint)
      also closes it.
  RU: Содержимое диалога — общая nm-auth-form; нижняя ссылка переключает вход /
      регистрацию на месте. Успех закрывает диалог и эмитит `authenticated`;
      ссылка-переход внутри формы (политика, подсказка блокировки) тоже закрывает.
-->
<nm-dialog [(open)]="open" titleKey="auth_dialog_title">
  <nm-auth-form
    [(mode)]="mode"
    linkMode="toggle"
    (succeeded)="onSucceeded()"
    (dismiss)="open.set(false)" />
</nm-dialog>
