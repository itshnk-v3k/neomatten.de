<!--
  EN: "Or continue with" divider + Google / Facebook outline buttons. Google uses
      its official 4-colour glyph (simple-icons is single-hex, so it can't show
      the multicolour mark); Facebook keeps its single brand blue via nm-brand-icon.
  RU: Разделитель «Oder weiter mit» + кнопки Google / Facebook (outline). Google —
      официальный 4-цветный глиф (simple-icons одноцветный); Facebook — фирменный
      синий через nm-brand-icon.
-->
<div class="relative my-4">
  <div class="absolute inset-0 flex items-center">
    <span class="w-full border-t border-border"></span>
  </div>
  <div class="relative flex justify-center text-sm">
    <span class="bg-surface px-3 text-content-muted">
      {{ 'auth_or_continue_with' | translate }}
    </span>
  </div>
</div>

<!-- Side by side (equal width); icon-only below sm, icon + label from sm up. -->
<div class="flex flex-row gap-3">
  <button
    nmButton
    variant="outline"
    type="button"
    class="flex min-w-0 flex-1 items-center justify-center gap-2"
    (click)="loginWithGoogle()">
    <!-- Official multicolour Google "G" (4 brand colours, not a single hex). -->
    <svg class="size-5 shrink-0" viewBox="0 0 48 48" aria-hidden="true" focusable="false">
      <path
        fill="#EA4335"
        d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
      <path
        fill="#4285F4"
        d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
      <path
        fill="#FBBC05"
        d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
      <path
        fill="#34A853"
        d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
    </svg>
    <span class="hidden truncate sm:inline">{{ 'auth_google' | translate }}</span>
  </button>
  <button
    nmButton
    variant="outline"
    type="button"
    class="flex min-w-0 flex-1 items-center justify-center gap-2"
    (click)="loginWithFacebook()">
    <nm-brand-icon [icon]="facebook" [colored]="true" class="size-5 shrink-0" />
    <span class="hidden truncate sm:inline">{{ 'auth_facebook' | translate }}</span>
  </button>
</div>
