<!--
  EN: Side-anchored panel over a dimmed backdrop, rendered only while open(). When
      dismissible, a full-screen focusable backdrop button (behind the panel)
      closes on click; Escape and the X button also close.
  RU: Панель у выбранной стороны поверх затемнённого фона, только при open(). Если
      dismissible, полноэкранная фокусируемая кнопка-фон (за панелью) закрывает по
      клику; Escape и кнопка X также закрывают.
-->
@if (open()) {
  <div class="fixed inset-0 z-popup flex bg-ink/60 animate-in fade-in" [class]="containerClasses()">
    @if (dismissible()) {
      <button type="button" class="absolute inset-0 size-full cursor-default" (click)="close()">
        <span class="sr-only">{{ 'action_close' | translate }}</span>
      </button>
    }
    <div
      role="dialog"
      aria-modal="true"
      [attr.aria-labelledby]="titleKey() ? titleId : null"
      class="relative flex flex-col overflow-y-auto bg-surface p-6 shadow-elev"
      [class]="panelClasses()">
      @if (titleKey()) {
        <h2 [id]="titleId" class="mb-4 pr-8 text-lg font-semibold text-content">
          {{ titleKey() | translate }}
        </h2>
      }

      @if (dismissible()) {
        <button
          type="button"
          class="absolute right-4 top-4 inline-flex size-8 items-center justify-center rounded-md text-content-muted transition-colors hover:bg-surface-subtle hover:text-content"
          (click)="close()">
          <svg lucideX class="size-5"></svg>
          <span class="sr-only">{{ 'action_close' | translate }}</span>
        </button>
      }

      <div class="text-sm text-content">
        <ng-content />
      </div>
    </div>
  </div>
}
