<!--
  EN: Register page — breadcrumb + the shared auth card (nm-auth-form) in register
      mode. The card owns the form, social login and the "have an account?" link.
  RU: Страница регистрации — крошки + общая карточка (nm-auth-form) в режиме
      регистрации. Карточка содержит форму, вход через соцсети и ссылку «есть аккаунт?».
-->
<section class="mx-auto max-w-container px-6 py-12 lg:py-16">
  <nm-breadcrumb />
  <div class="mx-auto max-w-md">
    <nm-auth-form mode="register" (succeeded)="onSucceeded()" />
  </div>
</section>
