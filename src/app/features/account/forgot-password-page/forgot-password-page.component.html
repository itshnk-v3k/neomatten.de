<!--
  EN: Forgot-password page — email field, or a success state after submit.
  RU: Страница восстановления пароля — поле e-mail или состояние успеха после отправки.
-->
<section class="mx-auto max-w-container px-6 py-12 lg:py-16">
  <nm-breadcrumb />
  <div class="mx-auto max-w-md rounded-2xl border border-border bg-surface p-8 shadow-soft">
    <h1 class="text-2xl font-bold">{{ 'auth_forgot_title' | translate }}</h1>
    @if (sent()) {
      <p class="mt-4 text-content-secondary">{{ 'auth_forgot_success' | translate }}</p>
      <a routerLink="/account/login" nmButton variant="outline" class="mt-6">
        {{ 'auth_login_tab' | translate }}
      </a>
    } @else {
      <p class="mt-3 text-sm text-content-secondary">{{ 'auth_forgot_intro' | translate }}</p>
      <form [formGroup]="form" (ngSubmit)="submit()" class="mt-6 flex flex-col gap-4">
        <nm-input
          formControlName="email"
          type="email"
          label="form_email"
          placeholder="form_email_placeholder"
          autocomplete="email"
          [required]="true" />
        <button nmButton type="submit" class="mt-2" [loading]="submitting()">
          {{ 'action_send' | translate }}
        </button>
      </form>
    }
  </div>
</section>
