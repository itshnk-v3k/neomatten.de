<!-- ===================== REVIEWS ===================== -->
<!-- The reviews embla carousel only mounts once scrolled near (nmLazySection). -->
<div nmLazySection (sectionVisible)="reviewsVisible.set(true)">
  @if (reviewsVisible()) {
    <nm-reviews />
  } @else {
    <section class="bg-surface py-16 lg:py-24">
      <div class="mx-auto grid max-w-container gap-5 px-6 sm:grid-cols-2 lg:grid-cols-3">
        @for (i of [0, 1, 2]; track i) {
          <div class="flex flex-col gap-2 rounded-lg border border-border p-4">
            <div class="flex items-center gap-3">
              <nm-skeleton variant="circle" class="size-10" />
              <div class="flex flex-1 flex-col gap-1">
                <nm-skeleton variant="text" class="w-32" />
                <nm-skeleton variant="badge" class="w-20" />
              </div>
            </div>
            <nm-skeleton variant="text" [lines]="3" />
          </div>
        }
      </div>
    </section>
  }
</div>
