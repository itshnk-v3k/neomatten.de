<!-- ===================== GALLERY ===================== -->
<section id="arbeiten" class="bg-surface-subtle py-16 lg:py-24">
  <div class="mx-auto max-w-container px-6">
    <div class="mx-auto mb-12 max-w-2xl text-center" nmReveal>
      <span class="text-sm font-semibold uppercase tracking-[3px] text-primary">
        {{ 'home_gallery_eyebrow' | translate }}
      </span>
      <h2 class="mt-3 text-3xl font-bold md:text-4xl">{{ 'home_gallery_title' | translate }}</h2>
    </div>

    <div nmLazySection (sectionVisible)="galleryVisible.set(true)">
      @if (galleryVisible()) {
        <div class="mx-auto max-w-4xl" nmReveal>
          <nm-gallery [albums]="galleryAlbums" />
        </div>
      } @else {
        <div class="mx-auto grid max-w-4xl gap-4 sm:grid-cols-3">
          @for (i of [0, 1, 2]; track i) {
            <nm-skeleton variant="card" />
          }
        </div>
      }
    </div>
  </div>
</section>
