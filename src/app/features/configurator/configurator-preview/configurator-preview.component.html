<!--
  EN: Left column — mat preview (steps 1–10) cross-fading to the car diagram
      (steps 11–13) on desktop; both stack on mobile. Plus the desktop total.
  RU: Левая колонка — превью коврика (шаги 1–10) с переходом на схему авто
      (шаги 11–13) на десктопе; на мобиле обе видны. Плюс итог (десктоп).
-->
<div
  class="mb-6 flex flex-col gap-4 lg:sticky lg:top-20 lg:mb-0 lg:w-[420px] lg:shrink-0 lg:gap-6 lg:self-start">
  <!-- Mat preview: desktop steps 1–10; collapses from step 11. Always on mobile. -->
  <div
    [class]="
      'ease-out-brand mx-auto w-full max-w-[240px] transition-all duration-300 lg:max-w-full ' +
      (activeStep() >= 11
        ? 'lg:pointer-events-none lg:max-h-0 lg:scale-95 lg:overflow-hidden lg:opacity-0'
        : 'lg:max-h-[640px] lg:scale-100 lg:opacity-100')
    ">
    <nm-mat-preview
      [texture]="texture()"
      [materialHex]="materialHex()"
      [edgeHex]="edgeHex()"
      [mounting]="mounting()"
      [heelPad]="heelPad()"
      [heelRest]="heelRest()"
      [caption]="caption()"
      [sku]="sku()"
      [colorId]="colorId()" />
  </div>

  <!-- Car diagram: desktop from step 11; collapsed on steps 1–10. Always on mobile. -->
  <div
    [class]="
      'ease-out-brand rounded-2xl border border-border bg-surface p-4 shadow-soft transition-all duration-300 lg:p-5 ' +
      (activeStep() >= 11
        ? 'lg:max-h-[720px] lg:scale-100 lg:opacity-100'
        : 'lg:pointer-events-none lg:max-h-0 lg:scale-95 lg:overflow-hidden lg:border-0 lg:p-0 lg:opacity-0')
    ">
    <h2 class="text-sm font-semibold text-content-secondary">
      {{ 'configurator_diagram_title' | translate }}
    </h2>
    <p class="mt-1 text-xs text-content-muted">
      {{ 'configurator_diagram_hint' | translate }}
    </p>
    <div class="mx-auto mt-3 max-w-[150px] lg:max-w-full">
      <nm-car-diagram [zones]="zones()" (zoneToggle)="zoneToggle.emit($event)" />
    </div>
  </div>

  <!-- Total (desktop only; mobile uses the sticky bottom bar) -->
  <div class="hidden items-center justify-between rounded-2xl bg-ink p-5 text-white lg:flex">
    <span class="text-sm text-white/75">{{ 'configurator_total' | translate }}</span>
    <span class="text-2xl font-extrabold">{{ total() }} &euro;</span>
  </div>
</div>
