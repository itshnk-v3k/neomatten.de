<!--
  EN: EVA-leather bags listing — breadcrumb, heading/intro and a responsive grid
      of product cards.
  RU: Список сумок из EVA-кожи — крошки, заголовок/вступление и адаптивная сетка
      карточек товаров.
-->
<section class="mx-auto max-w-container px-6 py-12 lg:py-16">
  <nm-breadcrumb />
  <header class="mb-8 max-w-2xl">
    <h1 class="text-3xl font-bold md:text-4xl">{{ 'page_leather_bags_title' | translate }}</h1>
    <p class="mt-3 text-content-secondary">{{ 'leather_bags_intro' | translate }}</p>
  </header>

  @if (products.loading()) {
    <div class="grid grid-cols-1 gap-5 sm:grid-cols-2 lg:grid-cols-3">
      @for (i of [0, 1, 2, 3, 4, 5]; track i) {
        <nm-skeleton variant="card" />
      }
    </div>
  } @else {
    <div class="grid grid-cols-1 gap-5 sm:grid-cols-2 lg:grid-cols-3">
      @for (product of items(); track product.id) {
        <nm-product-card [product]="product" />
      }
    </div>
  }
</section>
