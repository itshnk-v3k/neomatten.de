<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>NEOMATTEN — EVA-Automatten nach Maß</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="NEOMATTEN — maßgefertigte EVA-Automatten für Ihr Fahrzeug. Hergestellt für Deutschland und Europa." />
    <meta name="theme-color" content="#1A1A1A" />
    <meta name="author" content="NEOMATTEN" />
    <meta name="robots" content="index, follow" />

    <!--
      Security headers. The authoritative versions are set as real HTTP headers by
      Nginx in production; these <meta> equivalents keep a baseline on static hosts.
      The CSP intentionally allows 'unsafe-inline' (Angular injects component <style>
      tags at runtime) and 'unsafe-eval' (the JIT dev build); the production AOT
      build needs neither but they keep the same document valid across both builds.
      `frame-ancestors` is intentionally omitted here — browsers ignore it in a
      <meta> CSP (and log a console error); Nginx sets it as a real header.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com https://m.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://cdn.neomatten.de; media-src 'self'; connect-src 'self' ws: wss: https://api.neomatten.de https://*.tile.openstreetmap.org https://api.stripe.com; frame-src https://js.stripe.com https://hooks.stripe.com; base-uri 'self'; form-action 'self'" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />

    <link rel="icon" type="image/png" href="assets/logo/neomat_nm_transparent.png" />

    <!-- Fonts: preconnect to cut the connection-setup latency, then load Montserrat
         non-render-blocking with display=swap. Only the weights actually used by the
         UI (400/500/600/700/800) are requested. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" />

    <!-- LCP: the hero poster backs the desktop hero <video> and is the mobile hero
         image. Preload it at high priority so it paints as early as possible. -->
    <link rel="preload" as="image" href="assets/content/hero-poster.jpg" fetchpriority="high" />

    <!-- Default-language dictionary, fetched at app init. Prefetched (not
         preloaded) so it warms the cache without the browser's "preloaded but not
         used within a few seconds" warning when the HttpClient fetch doesn't match
         the preload's request mode. (Default language is 'de'; a non-default cookie
         choice falls back to a normal runtime fetch.) -->
    <link rel="prefetch" href="assets/i18n/de/common.json" />
  </head>
  <body class="font-montserrat">
    <nm-root></nm-root>
  </body>
</html>
